data:
  raw_path: "data/credit_data.csv"
  target_column: "target"
  test_size: 0.2
  random_state: 42

features:
  drop_columns: []

model:
  save_path: "models/credit_model.pkl"
  algorithm: "xgboost"

training:
  n_estimators: 500
  max_depth: 5
  learning_rate: 0.03
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 3
  gamma: 0.1
  reg_alpha: 0.1
  reg_lambda: 1.0

app:
  host: "0.0.0.0"
  port: 5000
  debug: true